<script>
const pages={

skills:{title:'스킬',html:`<p class="muted">스킬은 총 42종입니다. 공개 위키에서는 계열, 해금 레벨, MP, 쿨타임, 효과를 기준으로 정리합니다.</p><table><tr><th>분류</th><th>설명</th></tr><tr><td>전사 스킬</td><td>강타, 방패 올리기, 전투 함성 등 생존과 근접 공격 중심입니다.</td></tr><tr><td>도적 스킬</td><td>기습, 회피, 독 계열 등 치명타와 변동성 중심입니다.</td></tr><tr><td>마법사 스킬</td><td>원소 공격, MP 운용, 강한 스킬 피해 중심입니다.</td></tr><tr><td>고티어 스킬</td><td>상위 전직 이후 해금되는 계열 특화 스킬입니다.</td></tr></table>`},
items:{title:'아이템',html:`<table><tr><th>분류</th><th>수량</th><th>목록</th></tr><tr><td>무기</td><td>33종</td><td>나무검, 녹슨 검, 수습 마도사의 지팡이, 사냥 단검, 철검, 잿불 지팡이, 강철검, 그림자 단검, 룬 각인검, 서약의 검, 침묵의 송곳니, 폭풍 지팡이 외</td></tr><tr><td>방어구</td><td>30종</td><td>천 갑옷, 가죽 갑옷, 철 갑옷, 정찰자의 망토, 강철 갑옷, 룬 로브, 수호자의 판금갑옷 외</td></tr><tr><td>반지</td><td>27종</td><td>수련 반지, 민첩의 반지, 동전 반지, 베테랑 반지, 행운의 반지, 기사의 서약 반지 외</td></tr><tr><td>유물</td><td>10종</td><td>숲의 부적, 골렘 핵, 저주받은 메달, 룬 나침반, 탐험가의 지도, 월광 부적, 거인의 휘장, 현자의 모래시계, 회귀자의 관, 세계씨앗 성물</td></tr><tr><td>소모품</td><td>16종</td><td>작은 회복약, 작은 마나 물약, 중형 회복약, 중형 마나 물약, 대형 회복약, 대형 마나 물약, 혼합 영약, 원정 비상식량 외</td></tr></table><p class="muted">장비에는 타입, 등급, 가격, 능력치, 계열 정보가 존재합니다.</p>`},
monsters:{title:'몬스터',html:`<h3>일반 몬스터</h3><table><tr><th>이름</th><th>레벨</th></tr><tr><td>초원 슬라임</td><td>1</td></tr><tr><td>뿔토끼</td><td>2</td></tr><tr><td>숲 고블린</td><td>3</td></tr><tr><td>굶주린 늑대</td><td>4</td></tr><tr><td>광산 박쥐</td><td>5</td></tr><tr><td>낡은 해골병</td><td>6</td></tr><tr><td>광산 거미</td><td>7</td></tr><tr><td>돌 장난꾼</td><td>8</td></tr><tr><td>저주받은 병사</td><td>10</td></tr><tr><td>늪지 도깨비불</td><td>12</td></tr><tr><td>룬 수습사제</td><td>14</td></tr><tr><td>잿빛 사냥개</td><td>16</td></tr></table><h3>보스</h3><table><tr><th>이름</th><th>레벨</th></tr><tr><td>숲의 문지기</td><td>5</td></tr><tr><td>광산 골렘</td><td>9</td></tr><tr><td>저주 기사</td><td>14</td></tr><tr><td>룬 뱀</td><td>18</td></tr><tr><td>근원의 거상</td><td>32</td></tr></table>`},
dungeons:{title:'던전',html:`<table><tr><th>던전</th><th>입장 레벨</th><th>구성</th><th>첫 클리어 보상</th></tr><tr><td>초보자의 숲</td><td>3</td><td>5층</td><td>150G, 숲의 부적</td></tr><tr><td>버려진 광산</td><td>7</td><td>5층</td><td>300G, 골렘 핵</td></tr><tr><td>저주받은 성문</td><td>12</td><td>5층</td><td>600G, 저주받은 메달</td></tr><tr><td>고대 룬 성소</td><td>18</td><td>5층</td><td>1000G, 룬 나침반</td></tr><tr><td>근원의 균열</td><td>28</td><td>5층</td><td>2600G, 세계씨앗 유물</td></tr></table>`},
growth:{title:'성장',html:`<div class="list"><div class="entry"><h3>환생 강화</h3><p>환생 이후에도 남는 영구 성장 요소입니다.</p><div class="stats"><span class="stat">경험의 각인</span><span class="stat">검의 기억</span><span class="stat">불굴의 피</span><span class="stat">룬 증폭</span><span class="stat">귀환 보급</span><span class="stat">금화 감각</span><span class="stat">환생석 공명</span><span class="stat">거인 사냥꾼</span><span class="stat">연금술 손재주</span><span class="stat">원정 기록술</span><span class="stat">전리품 감각</span><span class="stat">기억 보관함</span></div></div><div class="entry"><h3>숙련</h3><p>전사 숙련, 도적 숙련, 마법사 숙련 3종이 존재합니다.</p></div><div class="entry"><h3>업적</h3><p>업적은 22종이며, 등급·조건·보상으로 구성됩니다.</p></div></div>`},
shop:{title:'상점',html:`<table><tr><th>항목</th><th>공개 상태</th><th>설명</th></tr><tr><td>상점 재고</td><td>105개 항목</td><td>소모품과 장비 재고가 단계별로 구성됩니다.</td></tr><tr><td>광고 보상</td><td>SDK 연동 전</td><td>Rewarded 광고 구조로 설계되어 있습니다.</td></tr><tr><td>광고 제거</td><td>상품 ID 필요</td><td>Google Play 상품 ID 확정 후 적용할 수 있습니다.</td></tr><tr><td>포션 보급품</td><td>상품 ID 필요</td><td>포션을 10개 단위로 지급하는 상품입니다.</td></tr><tr><td>원정 패스</td><td>상품 ID 필요</td><td>경험치, 골드, 환생석 보너스와 광고 제거를 제공하는 영구 상품입니다.</td></tr></table>`}
};
function show(id){const p=pages[id]||pages.home;document.getElementById('title').textContent=p.title;document.getElementById('view').innerHTML=p.html;document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===id));location.hash=id==='home'?'':id;}
document.addEventListener('click',e=>{const b=e.target.closest('[data-page]');if(b)show(b.dataset.page)});show(location.hash.slice(1)||'home');
</script>
</body>
