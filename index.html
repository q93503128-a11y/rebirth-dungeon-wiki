ocument.getElementById('calc-upgrade')?.addEventListener('change',runCalc);document.getElementById('calc-current')?.addEventListener('input',runCalc);document.getElementById('calc-target')?.addEventListener('input',runCalc);if(pageId==='growth')runCalc();}document.addEventListener('click',e=>{const p=e.target.closest('[data-page]');if(p)showPage(p.dataset.page);const t=e.target.closest('[data-target]');if(t)document.getElementById(t.dataset.target)?.scrollIntoView({behavior:'smooth',block:'start'});});document.getElementById('brand-home').addEventListener('click',e=>{e.preventDefault();showPage('home');});searchInput.addEventListener('input',()=>applySearch((location.hash||'#home').slice(1)||'home'));showPage((location.hash||'#home').slice(1)||'home');</script></body></html>
